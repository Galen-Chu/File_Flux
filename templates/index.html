<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Flux - Cloud File Manager</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            text-align: center;
            background: white;
            padding: 3rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            max-width: 600px;
        }
        h1 {
            color: #333;
            margin-bottom: 2rem;
        }
        .status-box {
            background: #f8f9fa;
            padding: 2rem;
            border-radius: 10px;
            margin: 1.5rem 0;
        }
        .status-text {
            font-size: 1.5rem;
            font-weight: bold;
            margin: 1rem 0;
        }
        .status-en {
            color: #667eea;
        }
        .status-zh {
            color: #764ba2;
        }
        .online-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: #28a745;
            border-radius: 50%;
            margin-right: 10px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
        .nav-button {
            display: inline-block;
            margin-top: 2rem;
            padding: 0.75rem 2rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .nav-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>File Flux</h1>
        <div class="status-box">
            <div class="status-text status-en">
                <span class="online-indicator"></span>
                {{ status_en }}
            </div>
            <div class="status-text status-zh">
                <span class="online-indicator"></span>
                {{ status_zh }}
            </div>
        </div>
        <a href="{% url 'manager:file_manager' %}" class="nav-button">
            Open File Manager
        </a>
    </div>
</body>
</html>
